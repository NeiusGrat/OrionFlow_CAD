<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- OrionFlow mark: the three-star constellation drawn as a drafting
       polyline. Vellum strokes on warm ink, drafting-blue apex — matches
       orionflow.in and the studio. -->
  <rect width="64" height="64" rx="12" fill="#221D16"/>
  <g transform="translate(6,6) scale(2)">
    <!-- faint drafting grid, the way the sheet is printed -->
    <g stroke="#332C22" stroke-width="0.5">
      <path d="M0 6.5h26M0 13h26M0 19.5h26"/>
      <path d="M6.5 0v26M13 0v26M19.5 0v26"/>
    </g>
    <!-- constellation -->
    <g stroke="#EFE7D8" stroke-width="1.6" stroke-linecap="round" fill="none">
      <path d="M6 19 L13 7"/>
      <path d="M13 7 L20 13"/>
    </g>
    <circle cx="6" cy="19" r="2.6" fill="#EFE7D8"/>
    <circle cx="20" cy="13" r="2.6" fill="#EFE7D8"/>
    <circle cx="13" cy="7" r="3.2" fill="#8AA5E6"/>
  </g>
</svg>

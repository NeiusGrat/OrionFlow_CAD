# OrionFlow backend on Fly.io — recommended free host for the build123d/OCP API.
# 1 GB RAM handles OpenCascade; auto-stop scales to zero between requests so a
# low-traffic launch month stays at ~$0.
#
#   fly launch --no-deploy        # creates the app, pick a name + region
#   fly secrets set GROQ_API_KEY=... DB_HOST=... DB_PASSWORD=... JWT_SECRET_KEY=...
#   fly deploy
#   fly certs add api.orionflow.in

app = "orionflow-api"
primary_region = "bom"          # Mumbai — closest to India; change if needed

[build]
  dockerfile = "Dockerfile"
  build-target = "production"

[deploy]
  # Runs in a throwaway machine before the new version goes live.
  release_command = "alembic upgrade head"

[env]
  ENVIRONMENT = "production"
  DEBUG = "false"
  LLM_PROVIDER = "groq"
  OFL_LLM_PROVIDER = "groq"
  PYTHONPATH = "/app"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.http_options.response.headers]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

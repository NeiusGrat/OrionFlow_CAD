# OrionFlow CAD Engine - Docker Compose Configuration
# Production-ready setup with all services

version: '3.8'

services:
  # ===========================================================================
  # API Service
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: orionflow-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-orionflow}
      - DB_PASSWORD=${DB_PASSWORD:-orionflow}
      - DB_NAME=${DB_NAME:-orionflow}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,https://orionflow.dev
    volumes:
      - outputs:/app/outputs
      - data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - orionflow-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.orionflow.dev`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # ===========================================================================
  # Celery Worker
  # ===========================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: orionflow-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      - ENVIRONMENT=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-orionflow}
      - DB_PASSWORD=${DB_PASSWORD:-orionflow}
      - DB_NAME=${DB_NAME:-orionflow}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - outputs:/app/outputs
      - data:/app/data
    depends_on:
      - api
      - redis
      - postgres
    networks:
      - orionflow-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ===========================================================================
  # Celery Beat Scheduler
  # ===========================================================================
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: beat
    container_name: orionflow-beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - orionflow-network

  # ===========================================================================
  # Flower (Celery Monitoring)
  # ===========================================================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: orionflow-flower
    restart: unless-stopped
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - worker
    networks:
      - orionflow-network

  # ===========================================================================
  # Frontend
  # ===========================================================================
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        - VITE_API_URL=http://localhost:8000
        - VITE_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
    container_name: orionflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - orionflow-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`orionflow.dev`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: orionflow-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-orionflow}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-orionflow}
      - POSTGRES_DB=${DB_NAME:-orionflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-orionflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orionflow-network

  # ===========================================================================
  # Redis Cache & Message Broker
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: orionflow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orionflow-network

  # ===========================================================================
  # Prometheus (Metrics)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: orionflow-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - orionflow-network

  # ===========================================================================
  # Grafana (Dashboards)
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: orionflow-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - orionflow-network

# ===========================================================================
# Networks
# ===========================================================================
networks:
  orionflow-network:
    driver: bridge

# ===========================================================================
# Volumes
# ===========================================================================
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  outputs:
  data:

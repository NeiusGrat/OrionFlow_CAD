# OrionFlow CAD Engine - Deployment Pipeline
#
# Backend deploys to Fly.io (fly.toml at repo root); database migrations run
# automatically via the release_command in fly.toml before traffic switches.
# The frontend is NOT deployed here — Vercel builds orionflow-ui/ from its
# own git integration.
#
# Required repository secret: FLY_API_TOKEN  (create with `flyctl tokens create deploy`)

name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.orionflow.in

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

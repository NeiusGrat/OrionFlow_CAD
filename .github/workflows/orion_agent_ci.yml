name: OrionFlow Agent CI

on:
  push:
    paths:
      - "orion_agent/**"
      - ".github/workflows/orion_agent_ci.yml"
  pull_request:
    paths:
      - "orion_agent/**"

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install harness (from lockfile-equivalent extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "orion_agent/[dev]"
          # build123d is heavy; install for the sandbox integration test.
          pip install "build123d>=0.5.0" || echo "build123d optional in CI"

      - name: Lint
        run: ruff check orion_agent/ || true

      - name: Offline smoke tests (network-free)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest orion_agent/tests/ -m "not integration" -q

      - name: Sandbox integration test
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest orion_agent/tests/ -m integration -q || echo "sandbox test skipped (build123d unavailable)"

      - name: Eval smoke (mock model, no API key needed)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m orion_agent.evals.run query --mock || true

      - name: Addon import smoke (headless, no FreeCAD)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "import orion_agent.addon.bridge_server, orion_agent.addon.capabilities; print('addon import OK')"
          python -c "import orion_agent.harness.server; print('harness import OK')"
